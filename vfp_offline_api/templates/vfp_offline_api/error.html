{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ status_code }} | VFP Sales Sync</title>
    <link rel="icon" type="image/svg+xml" href="{% static 'vfp_offline_api/images/favicon.svg' %}">
    <style>
        :root {
            --ink: #142033;
            --muted: #667085;
            --line: #d7e0ea;
            --panel: #ffffff;
            --page: #eef3f8;
            --brand: #1769aa;
            --brand-dark: #0f4d7e;
            --green: #2f855a;
            --danger-soft: #fff3f0;
            --danger: #b42318;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: Arial, Helvetica, sans-serif;
            color: var(--ink);
            background:
                linear-gradient(90deg, rgba(10, 37, 64, 0.88), rgba(10, 37, 64, 0.54), rgba(10, 37, 64, 0.12)),
                url("{% static 'vfp_offline_api/images/analytics-bg.png' %}") center / cover;
        }

        .shell {
            width: min(980px, calc(100vw - 32px));
            min-height: 520px;
            display: grid;
            grid-template-columns: 0.9fr 1.1fr;
            background: var(--panel);
            border: 1px solid var(--line);
            box-shadow: 0 24px 70px rgba(17, 24, 39, 0.24);
        }

        .status-panel {
            padding: 42px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background: #0f4d7e;
            color: #fff;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
        }

        .brand-mark {
            width: 44px;
            height: 44px;
            display: grid;
            place-items: center;
            border: 2px solid rgba(255, 255, 255, 0.7);
            background: rgba(255, 255, 255, 0.12);
        }

        .code {
            margin: 44px 0 12px;
            font-size: 86px;
            line-height: 0.95;
            font-weight: 700;
            letter-spacing: 0;
        }

        .status-panel p {
            max-width: 300px;
            margin: 0;
            color: rgba(255, 255, 255, 0.82);
            line-height: 1.6;
        }

        .content {
            padding: 54px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .mode {
            width: fit-content;
            padding: 7px 10px;
            margin-bottom: 18px;
            color: var(--green);
            background: #eef8f2;
            border: 1px solid #cfe8d9;
            font-size: 12px;
            font-weight: 700;
        }

        h1 {
            margin: 0 0 12px;
            font-size: 34px;
            line-height: 1.15;
            letter-spacing: 0;
        }

        .lead {
            margin: 0 0 20px;
            color: var(--muted);
            font-size: 15px;
            line-height: 1.7;
        }

        .path-box {
            margin: 0 0 24px;
            padding: 13px 14px;
            border: 1px solid var(--line);
            background: #f7f9fc;
            color: #344054;
            font-size: 13px;
            overflow-wrap: anywhere;
        }

        .warning {
            margin: 0 0 28px;
            padding: 13px 14px;
            color: var(--danger);
            background: var(--danger-soft);
            border: 1px solid #ffd5cc;
            font-size: 13px;
            line-height: 1.55;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .button {
            min-height: 40px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0 14px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 700;
        }

        .primary {
            color: #fff;
            background: var(--brand);
        }

        .primary:hover { background: var(--brand-dark); }

        .muted {
            color: #344054;
            background: #eef3f8;
        }

        @media (max-width: 760px) {
            .shell {
                grid-template-columns: 1fr;
            }

            .status-panel {
                min-height: 280px;
                padding: 30px;
            }

            .code {
                font-size: 68px;
            }

            .content {
                padding: 34px 28px;
            }

            h1 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <main class="shell">
        <section class="status-panel">
            <div>
                <div class="brand">
                    <div class="brand-mark">VF</div>
                    <span>VFP Sales Sync</span>
                </div>
                <div class="code">{{ status_code }}</div>
                <p>Clean application errors for safer cloud deployment.</p>
            </div>
        </section>
        <section class="content">
            <div class="mode">{{ mode_label }}</div>
            <h1>{{ page_title }}</h1>
            <p class="lead">{{ message }}</p>
            <div class="path-box">Requested path: {{ path }}</div>
            <p class="warning">{{ mode_message }}</p>
            <div class="actions">
                <a class="button primary" href="{% url 'dashboard' %}">Go to Dashboard</a>
                <a class="button muted" href="{% url 'login' %}">Back to Login</a>
            </div>
        </section>
    </main>
</body>
</html>
