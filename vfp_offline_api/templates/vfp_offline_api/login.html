{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VFP Sync Login</title>
    <link rel="icon" type="image/svg+xml" href="{% static 'vfp_offline_api/images/favicon.svg' %}">
    <style>
        :root {
            --ink: #172033;
            --muted: #667085;
            --line: #d8dee8;
            --panel: #ffffff;
            --page: #eef3f8;
            --brand: #1769aa;
            --brand-dark: #0f4d7e;
            --accent: #2f855a;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: Arial, Helvetica, sans-serif;
            color: var(--ink);
            background:
                linear-gradient(135deg, rgba(23, 105, 170, 0.12), rgba(47, 133, 90, 0.12)),
                var(--page);
        }

        .shell {
            width: min(960px, calc(100vw - 32px));
            display: grid;
            grid-template-columns: 1.05fr 0.95fr;
            min-height: 520px;
            background: var(--panel);
            border: 1px solid var(--line);
            box-shadow: 0 24px 70px rgba(23, 32, 51, 0.16);
        }

        .brand-panel {
            padding: 44px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background:
                linear-gradient(rgba(15, 77, 126, 0.82), rgba(15, 77, 126, 0.82)),
                url("{% static 'vfp_offline_api/images/analytics-bg.png' %}") center / cover;
            color: #fff;
        }

        .brand-mark {
            width: 54px;
            height: 54px;
            display: grid;
            place-items: center;
            border: 2px solid rgba(255, 255, 255, 0.72);
            font-weight: 700;
            font-size: 20px;
            letter-spacing: 0;
            background: rgba(255, 255, 255, 0.12);
        }

        h1 {
            margin: 28px 0 14px;
            font-size: 40px;
            line-height: 1.1;
            letter-spacing: 0;
        }

        .brand-panel p {
            max-width: 420px;
            margin: 0;
            color: rgba(255, 255, 255, 0.82);
            font-size: 16px;
            line-height: 1.6;
        }

        .status-strip {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1px;
            border: 1px solid rgba(255, 255, 255, 0.24);
            background: rgba(255, 255, 255, 0.24);
        }

        .status-strip span {
            padding: 14px;
            background: rgba(255, 255, 255, 0.12);
            font-size: 13px;
            color: rgba(255, 255, 255, 0.9);
        }

        .login-panel {
            padding: 54px 46px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .login-panel h2 {
            margin: 0 0 8px;
            font-size: 26px;
            letter-spacing: 0;
        }

        .login-panel p {
            margin: 0 0 28px;
            color: var(--muted);
            font-size: 14px;
        }

        label {
            display: block;
            margin: 18px 0 8px;
            font-size: 13px;
            font-weight: 700;
            color: #344054;
        }

        input {
            width: 100%;
            height: 46px;
            border: 1px solid #c9d3df;
            padding: 0 13px;
            font-size: 15px;
            color: var(--ink);
            outline: none;
            background: #fbfdff;
        }

        input:focus {
            border-color: var(--brand);
            box-shadow: 0 0 0 3px rgba(23, 105, 170, 0.14);
        }

        button {
            width: 100%;
            height: 48px;
            margin-top: 26px;
            border: 0;
            background: var(--brand);
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
        }

        button:hover {
            background: var(--brand-dark);
        }

        .secondary-link {
            display: block;
            margin-top: 16px;
            color: var(--brand);
            font-size: 14px;
            font-weight: 700;
            text-align: center;
            text-decoration: none;
        }

        .error {
            min-height: 22px;
            margin-top: 14px;
            color: #b42318;
            font-size: 13px;
        }

        @media (max-width: 760px) {
            .shell {
                grid-template-columns: 1fr;
            }

            .brand-panel {
                min-height: 300px;
                padding: 32px;
            }

            h1 {
                font-size: 32px;
            }

            .login-panel {
                padding: 34px 28px;
            }
        }
    </style>
</head>
<body>
    <main class="shell">
        <section class="brand-panel">
            <div>
                <div class="brand-mark">VF</div>
                <h1>VFP Sales Sync</h1>
                <p>Offline sales records, clean API sync, and a focused view of incoming business data.</p>
            </div>
            <div class="status-strip" aria-label="System status">
                <span>Local API</span>
                <span>Bulk Sync</span>
                <span>Sales Ledger</span>
            </div>
        </section>
        <section class="login-panel">
            <h2>Sign In</h2>
            <p>Use your Django user account.</p>
            <form method="post">
                {% csrf_token %}
                <label for="username">Username</label>
                <input id="username" name="username" type="text" autocomplete="username" required autofocus>

                <label for="password">Password</label>
                <input id="password" name="password" type="password" autocomplete="current-password" required>

                <button type="submit">Login</button>
                <a class="secondary-link" href="{% url 'register' %}">Create new user</a>
                <div class="error">{{ error }}</div>
            </form>
        </section>
    </main>
</body>
</html>
